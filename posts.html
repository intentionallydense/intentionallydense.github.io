---
layout: default
title: Posts
permalink: /posts/
---
<div class="notes-stream">
  {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
  {% for post in sorted_posts %}
  <div class="post-group {% cycle 'post-a', 'post-b' %}">
    <div class="note-date">{{ post.date | date: "%Y-%m-%d" }}</div>
    {{ post.content }}
  </div>
  {% endfor %}
</div>

<canvas id="zoom-preview" width="300" height="300"></canvas>

<style>
  #zoom-preview {
    position: fixed;
    left: 680px;
    width: 300px;
    height: 300px;
    border: 1px solid #eee;
    border-radius: 3px;
    pointer-events: none;
    display: none;
    z-index: 5;
  }

  @media (max-width: 1040px) {
    #zoom-preview { display: none !important; }
  }
</style>

<script>
  // Zoom preview — composites all visible images onto a canvas at 3× zoom,
  // treating the post stream as one continuous surface. No jumps between
  // photos because every overlapping image is drawn in stacking order.
  (function() {
    const ZOOM = 3;
    const CANVAS_SIZE = 300;
    const MIN_VIEWPORT = 1040;
    const VIEW_SIZE = CANVAS_SIZE / ZOOM; // 100px source region

    const canvas = document.getElementById('zoom-preview');
    if (!canvas || window.innerWidth <= MIN_VIEWPORT) return;
    const ctx = canvas.getContext('2d');

    let mouseX = -1, mouseY = -1;
    let ticking = false;

    function updatePreview() {
      ticking = false;
      if (mouseX < 0) return;

      // Source region in viewport coords: 100×100 centered on cursor
      const srcL = mouseX - VIEW_SIZE / 2;
      const srcT = mouseY - VIEW_SIZE / 2;
      const srcR = srcL + VIEW_SIZE;
      const srcB = srcT + VIEW_SIZE;

      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      const imgs = document.querySelectorAll('.notes-stream img');
      let drewAny = false;

      // Draw in DOM order (later images paint on top, matching CSS stacking)
      imgs.forEach(function(img) {
        if (!img.naturalWidth) return;

        const rect = img.getBoundingClientRect();

        // Skip if no overlap with source region
        if (rect.right <= srcL || rect.left >= srcR ||
            rect.bottom <= srcT || rect.top >= srcB) return;

        // Intersection in viewport coords
        const intL = Math.max(srcL, rect.left);
        const intT = Math.max(srcT, rect.top);
        const intR = Math.min(srcR, rect.right);
        const intB = Math.min(srcB, rect.bottom);

        // Map intersection to image natural pixel coords (source)
        const sx = (intL - rect.left) / rect.width * img.naturalWidth;
        const sy = (intT - rect.top) / rect.height * img.naturalHeight;
        const sw = (intR - intL) / rect.width * img.naturalWidth;
        const sh = (intB - intT) / rect.height * img.naturalHeight;

        // Map intersection to canvas coords (destination)
        const dx = (intL - srcL) * ZOOM;
        const dy = (intT - srcT) * ZOOM;
        const dw = (intR - intL) * ZOOM;
        const dh = (intB - intT) * ZOOM;

        ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
        drewAny = true;
      });

      canvas.style.top = (mouseY - CANVAS_SIZE / 2) + 'px';
      canvas.style.display = drewAny ? 'block' : 'none';
    }

    function requestUpdate() {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(updatePreview);
      }
    }

    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      requestUpdate();
    });

    window.addEventListener('scroll', requestUpdate);

    document.addEventListener('mouseleave', function() {
      mouseX = -1;
      canvas.style.display = 'none';
    });
  })();

  // Dynamic sticky — all sticky elements (images, text, dates) pin in place,
  // hold until the next post arrives, then release off-screen together.
  // Uses offsetTop (document-relative) instead of getBoundingClientRect to
  // avoid feedback loops where changing sticky top shifts the element's rect.
  (function() {
    const IMG_TOP = 80;           // 5rem — image pin position
    const TEXT_TOP = 56;          // 3.5rem — text/date pin position
    const LAST_HOLD_FOR = 1200;   // px to hold the final post before releasing

    let stickyData = [];
    let ticking = false;

    function computeStickPoints() {
      const elements = document.querySelectorAll('.notes-stream p, .notes-stream .note-date');
      stickyData = [];
      elements.forEach(function(el) {
        const isImage = el.matches('p:has(img)');
        const stickTop = isImage ? IMG_TOP : TEXT_TOP;
        stickyData.push({
          el: el,
          stickTop: stickTop,
          stickAt: el.offsetTop - stickTop,
          group: el.closest('.post-group')
        });
      });

      // All elements in a post release together: when the next post's
      // first element is about to pin. Last post uses a fixed hold.
      for (let i = 0; i < stickyData.length; i++) {
        let releaseAt = stickyData[i].stickAt + LAST_HOLD_FOR;
        for (let j = i + 1; j < stickyData.length; j++) {
          if (stickyData[j].group !== stickyData[i].group) {
            releaseAt = stickyData[j].stickAt;
            break;
          }
        }
        stickyData[i].releaseAt = releaseAt;
      }
    }

    function update() {
      ticking = false;
      const scrollY = window.scrollY;

      stickyData.forEach(function(d) {
        const dist = scrollY - d.stickAt;
        const holdDist = d.releaseAt - d.stickAt;

        if (dist < 0) {
          d.el.style.top = d.stickTop + 'px';
        } else if (dist <= holdDist) {
          d.el.style.top = d.stickTop + 'px';
        } else {
          // Release: drift off screen
          const excess = dist - holdDist;
          d.el.style.top = (d.stickTop - excess) + 'px';
        }
      });
    }

    function onScroll() {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(update);
      }
    }

    // Compute after all images load so heights are correct
    window.addEventListener('load', function() {
      computeStickPoints();
      update();
    });
    // Also run immediately in case images are cached and load already fired
    computeStickPoints();

    window.addEventListener('scroll', onScroll);
  })();
</script>

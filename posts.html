---
layout: default
title: Posts
permalink: /posts/
---
<div class="notes-stream">
  {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
  {% for post in sorted_posts %}
  <div class="note-date">{{ post.date | date: "%Y-%m-%d" }}</div>
  {{ post.content }}
  {% endfor %}
</div>

<div id="zoom-preview"></div>

<style>
  #zoom-preview {
    position: fixed;
    left: 680px;
    width: 300px;
    height: 300px;
    border: 1px solid #eee;
    border-radius: 3px;
    background-repeat: no-repeat;
    pointer-events: none;
    display: none;
    z-index: 5;
  }

  @media (max-width: 1040px) {
    #zoom-preview { display: none !important; }
  }
</style>

<script>
  // Zoom preview — treats the entire post stream as one canvas.
  // Uses elementsFromPoint to find whatever image is under the cursor,
  // even behind text/dates. Updates on both mousemove and scroll.
  (function() {
    var preview = document.getElementById('zoom-preview');
    if (!preview || window.innerWidth <= 1040) return;

    var zoom = 3;
    var size = 300;
    var mouseX = -1, mouseY = -1;
    var ticking = false;

    function updatePreview() {
      ticking = false;
      if (mouseX < 0) return;

      // Find the first img under the cursor, regardless of what's on top
      var elements = document.elementsFromPoint(mouseX, mouseY);
      var img = null;
      for (var i = 0; i < elements.length; i++) {
        if (elements[i].tagName === 'IMG' && elements[i].closest('.notes-stream')) {
          img = elements[i];
          break;
        }
      }

      if (!img) {
        preview.style.display = 'none';
        return;
      }

      var rect = img.getBoundingClientRect();
      var x = Math.max(0, Math.min(1, (mouseX - rect.left) / rect.width));
      var y = Math.max(0, Math.min(1, (mouseY - rect.top) / rect.height));

      var bgW = rect.width * zoom;
      var bgH = rect.height * zoom;

      preview.style.backgroundImage = 'url(' + img.src + ')';
      preview.style.backgroundSize = bgW + 'px ' + bgH + 'px';
      preview.style.backgroundPosition = (-(x * bgW) + size / 2) + 'px ' + (-(y * bgH) + size / 2) + 'px';
      preview.style.top = (mouseY - size / 2) + 'px';
      preview.style.display = 'block';
    }

    function requestUpdate() {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(updatePreview);
      }
    }

    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      requestUpdate();
    });

    window.addEventListener('scroll', requestUpdate);

    document.addEventListener('mouseleave', function() {
      mouseX = -1;
      preview.style.display = 'none';
    });
  })();
</script>

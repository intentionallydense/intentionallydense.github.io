---
layout: default
title: Posts
permalink: /posts/
---
<div class="notes-stream">
  {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
  {% for post in sorted_posts %}
  <div class="post-group {% cycle 'post-a', 'post-b' %}">
    <div class="note-date">{{ post.date | date: "%Y-%m-%d" }}</div>
    {{ post.content }}
  </div>
  {% endfor %}
</div>

<canvas id="zoom-preview" width="300" height="300"></canvas>

<style>
  #zoom-preview {
    position: fixed;
    left: 680px;
    width: 300px;
    height: 300px;
    border: 1px solid #eee;
    border-radius: 3px;
    pointer-events: none;
    display: none;
    z-index: 5;
  }

  @media (max-width: 1040px) {
    #zoom-preview { display: none !important; }
  }
</style>

<script>
  // Zoom preview — composites all visible images onto a canvas at 3x zoom,
  // treating the post stream as one continuous surface. No jumps between
  // photos because every overlapping image is drawn in stacking order.
  (function() {
    var canvas = document.getElementById('zoom-preview');
    if (!canvas || window.innerWidth <= 1040) return;
    var ctx = canvas.getContext('2d');

    var zoom = 3;
    var size = 300;
    var viewSize = size / zoom; // 100px source region
    var mouseX = -1, mouseY = -1;
    var ticking = false;

    function updatePreview() {
      ticking = false;
      if (mouseX < 0) return;

      // Source region in viewport coords: 100x100 centered on cursor
      var srcL = mouseX - viewSize / 2;
      var srcT = mouseY - viewSize / 2;
      var srcR = srcL + viewSize;
      var srcB = srcT + viewSize;

      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, size, size);

      var imgs = document.querySelectorAll('.notes-stream img');
      var drewAny = false;

      // Draw in DOM order (later images paint on top, matching CSS stacking)
      imgs.forEach(function(img) {
        if (!img.naturalWidth) return; // not loaded yet

        var rect = img.getBoundingClientRect();

        // Skip if no overlap with source region
        if (rect.right <= srcL || rect.left >= srcR ||
            rect.bottom <= srcT || rect.top >= srcB) return;

        // Intersection in viewport coords
        var intL = Math.max(srcL, rect.left);
        var intT = Math.max(srcT, rect.top);
        var intR = Math.min(srcR, rect.right);
        var intB = Math.min(srcB, rect.bottom);

        // Map intersection to image natural pixel coords (source)
        var sx = (intL - rect.left) / rect.width * img.naturalWidth;
        var sy = (intT - rect.top) / rect.height * img.naturalHeight;
        var sw = (intR - intL) / rect.width * img.naturalWidth;
        var sh = (intB - intT) / rect.height * img.naturalHeight;

        // Map intersection to canvas coords (destination)
        var dx = (intL - srcL) * zoom;
        var dy = (intT - srcT) * zoom;
        var dw = (intR - intL) * zoom;
        var dh = (intB - intT) * zoom;

        try {
          ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
          drewAny = true;
        } catch(e) {}
      });

      canvas.style.top = (mouseY - size / 2) + 'px';
      canvas.style.display = drewAny ? 'block' : 'none';
    }

    function requestUpdate() {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(updatePreview);
      }
    }

    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      requestUpdate();
    });

    window.addEventListener('scroll', requestUpdate);

    document.addEventListener('mouseleave', function() {
      mouseX = -1;
      canvas.style.display = 'none';
    });
  })();

  // Dynamic sticky — images drift from 4.5rem to 1.5rem, hold for a while,
  // then release so they scroll away. Based on scroll distance, not post.
  (function() {
    var maxTop = 72;      // 4.5rem — starting pin position
    var minTop = 24;      // 1.5rem — drift target
    var driftOver = 400;  // px of scrolling to drift from maxTop to minTop
    var holdFor = 800;    // px of scrolling to hold at minTop before releasing
    var imgParas = document.querySelectorAll('.notes-stream p:has(img)');
    var stuckAt = new Map();
    var ticking = false;

    function update() {
      ticking = false;
      var scrollY = window.scrollY;

      imgParas.forEach(function(p) {
        var rect = p.getBoundingClientRect();

        // If released: check if we've scrolled back up past it
        if (p.style.position === 'relative') {
          if (rect.top > maxTop + 10) {
            p.style.position = '';
            p.style.top = maxTop + 'px';
            stuckAt.delete(p);
          }
          return;
        }

        // Not stuck yet — natural position is below the pin point
        var currentTop = parseFloat(p.style.top) || maxTop;
        if (rect.top > currentTop + 2) {
          stuckAt.delete(p);
          p.style.top = maxTop + 'px';
          return;
        }

        // Record when this image first became stuck
        if (!stuckAt.has(p)) {
          stuckAt.set(p, scrollY);
        }

        var dist = scrollY - stuckAt.get(p);

        if (dist <= driftOver) {
          // Phase 1: drift from maxTop to minTop
          var t = dist / driftOver;
          p.style.top = (maxTop - t * (maxTop - minTop)) + 'px';
        } else if (dist <= driftOver + holdFor) {
          // Phase 2: hold at minTop
          p.style.top = minTop + 'px';
        } else {
          // Phase 3: release — switch to relative so it scrolls away
          p.style.position = 'relative';
          p.style.top = '';
          stuckAt.delete(p);
        }
      });
    }

    function onScroll() {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(update);
      }
    }

    window.addEventListener('scroll', onScroll);
  })();
</script>

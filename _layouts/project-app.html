---
layout: default
---
<!-- Wider layout for interactive/app-style projects. Overrides body width and article img constraints. -->
<style>
  body { max-width: 900px; }
  article img { max-width: 100%; max-height: none; }
</style>

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%B %Y" }}</div>
  </header>
  {{ content }}
</article>

<a href="{{ '/artifacts/' | relative_url }}">← all artifacts</a>

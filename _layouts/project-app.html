<!--
  Layout for interactive/app-style projects that need more width
  than a standard article. Wraps in <article> for font consistency,
  overrides body width and image constraints.
-->
---
layout: default
---
<style>
  body { max-width: 900px; }
  article img { max-width: 100%; max-height: none; }
</style>

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%B %Y" }}</div>
  </header>
  {{ content }}
</article>

<a href="{{ '/projects/' | relative_url }}">← all projects</a>
